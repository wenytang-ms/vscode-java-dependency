name: "Java Dependency — Multi-module Maven Reactor"
description: |
  Verifies Java Projects tree rendering for the multi-module Maven fixture,
  including nested module naming and nested module pom visibility.

setup:
  extension: "redhat.java"
  vscodeVersion: "stable"
  workspace: "../multi-module"
  timeout: 180
  settings:
    java.configuration.checkProjectSettingsExclusions: false
    workbench.startupEditor: "none"

steps:
  - id: "ls-ready"
    action: "waitForLanguageServer"
    timeout: 180

  - id: "close-aux-bar"
    action: "executeVSCodeCommand workbench.action.closeAuxiliaryBar"

  - id: "collapse-outline"
    action: "collapseSidebarSection OUTLINE"

  - id: "collapse-timeline"
    action: "collapseSidebarSection TIMELINE"

  - id: "collapse-workspace-root"
    action: "collapseWorkspaceRoot"

  - id: "focus-java-projects"
    action: "executeVSCodeCommand javaProjectExplorer.focus"

  - id: "wait-tree-load"
    action: "wait 3 seconds"

  - id: "verify-reactor-project"
    action: "wait 1 seconds"
    verifyTreeItem:
      name: "de.myorg.myservice"
      inView: "Java Projects"
    timeout: 20

  - id: "verify-nested-module"
    action: "wait 1 seconds"
    verifyTreeItem:
      name: "level1"
      inView: "Java Projects"
    timeout: 20

  - id: "expand-level1"
    action: "expandTreeItem level1"

  - id: "wait-level1-expanded"
    action: "wait 2 seconds"

  - id: "verify-level1-pom"
    action: "wait 1 seconds"
    verifyTreeItem:
      name: "pom.xml"
      exact: true
      inView: "Java Projects"
    timeout: 20

  - id: "expand-reactor-project"
    action: "expandTreeItem de.myorg.myservice"

  - id: "expand-src-main"
    action: "expandTreeItem src/main/java"
    waitBefore: 2

  - id: "verify-root-package"
    action: "wait 1 seconds"
    verifyTreeItem:
      name: "fvclaus"
      exact: true
      inView: "Java Projects"
    timeout: 20

  - id: "expand-root-package"
    action: "expandTreeItem fvclaus"

  - id: "verify-root-app"
    action: "wait 1 seconds"
    verifyTreeItem:
      name: "App"
      exact: true
      inView: "Java Projects"
    timeout: 20
