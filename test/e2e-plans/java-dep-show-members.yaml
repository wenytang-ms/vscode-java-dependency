# Test Plan: Java Dependency — Show Class Members
#
# Covers the java.dependency.showMembers path in the Java Projects explorer.
# PrimaryTypeNode loads document symbols only when this setting is enabled,
# and clicking a DocumentSymbolNode navigates through java.view.package.outline.

name: "Java Dependency — Show Class Members"
description: |
  Expands App in the Java Projects explorer, verifies its main method is shown,
  and clicks that member through the tree to open App.java at the method.

setup:
  extension: "vscjava.vscode-java-pack"
  vscodeVersion: "stable"
  workspace: "../maven"
  timeout: 180
  settings:
    java.configuration.checkProjectSettingsExclusions: false
    java.dependency.showMembers: true
    workbench.startupEditor: "none"

steps:
  - id: "wait-for-java-language-server"
    action: "waitForLanguageServer"
    timeout: 180

  - id: "close-auxiliary-bar"
    action: "executeVSCodeCommand workbench.action.closeAuxiliaryBar"

  - id: "collapse-outline"
    action: "collapseSidebarSection OUTLINE"

  - id: "collapse-timeline"
    action: "collapseSidebarSection TIMELINE"

  - id: "collapse-workspace-explorer"
    action: "collapseSidebarSection maven"

  # Make the navigation assertion action-dependent: no editor, including
  # App.java, is open before the Java Projects member is clicked.
  - id: "close-all-editors-before-navigation"
    action: "executeVSCodeCommand workbench.action.closeAllEditors"

  - id: "focus-java-projects"
    action: "executeVSCodeCommand javaProjectExplorer.focus"

  - id: "wait-for-project-tree"
    action: "wait 3 seconds"

  - id: "expand-project"
    action: "expandTreeItem my-app"

  - id: "expand-main-source-root"
    action: "expandTreeItem src/main/java"

  - id: "expand-application-package"
    action: "expandTreeItem com.mycompany.app"

  # `expandTreeItem App` can substring-match the already-expanded `my-app`
  # project row. Select the exact class row instead, then use the tree's
  # keyboard disclosure behavior.
  - id: "select-exact-app-class"
    action: "click App tree item exact"

  # The class command may move workbench focus while opening App.java even
  # though it requests preserveFocus. Refocus the view so ArrowRight operates
  # on the selected App row on every platform.
  - id: "refocus-selected-app-class"
    action: "executeVSCodeCommand javaProjectExplorer.focus"

  - id: "expand-selected-app-class"
    action: "pressKey ArrowRight"

  - id: "wait-for-initial-member-load"
    action: "wait 3 seconds"

  # Wait for asynchronous document-symbol loading before closing the setup tab.
  - id: "verify-main-member-loaded"
    action: "wait 1 seconds"
    verifyTreeItem:
      name: "main(String[]) : void"
      exact: true
      inView: "Java Projects"
    timeout: 20

  # Selecting the type executes its open-file command. Close that setup tab so
  # only the subsequent member click can satisfy the navigation assertion.
  - id: "close-app-after-class-expansion"
    action: "executeVSCodeCommand workbench.action.closeAllEditors"

  - id: "refocus-java-projects-after-close"
    action: "executeVSCodeCommand javaProjectExplorer.focus"

  - id: "wait-for-class-members"
    action: "wait 1 seconds"

  # Re-verify after closing App.java. This screenshot captures the expanded
  # member in the action-dependent pre-click state with no editor already open.
  - id: "verify-main-member-visible"
    action: "wait 1 seconds"
    verifyTreeItem:
      name: "main(String[]) : void"
      exact: true
      inView: "Java Projects"
    timeout: 20

  # Use the real tree row rather than executeVSCodeCommand. The exact modifier
  # prevents a partial-label match from selecting another tree item.
  - id: "click-main-member"
    action: "click main(String[]) : void tree item exact"

  # Keep the postcondition separate from the target action. A negative-control
  # run with click-main-member removed therefore fails here instead of losing
  # the assertion together with the action.
  - id: "verify-member-navigation"
    action: "wait 1 seconds"
    verify: "App.java is open with the public static void main method visible."
    verifyEditorTab:
      title: "App.java"
    timeout: 20
