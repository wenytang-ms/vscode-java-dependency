# Minimal probe to verify the Copilot coding agent can trigger a
# workflow_dispatch (i.e. its token has `actions: write`) AND that a
# Copilot-selected `os` input correctly routes the run to that OS.
# This is a throwaway capability check for the in-session AutoTest design;
# it does nothing but echo its inputs and the runner it landed on.
name: Agent Dispatch Probe

on:
  workflow_dispatch:
    inputs:
      os:
        description: "Target OS the agent selected for this run"
        type: choice
        options:
          - linux
          - windows
        default: linux
      note:
        description: "Free-form marker so the agent can find its own run"
        type: string
        default: "probe"

jobs:
  probe:
    name: Probe (${{ inputs.os }})
    runs-on: ${{ inputs.os == 'windows' && 'windows-latest' || 'ubuntu-latest' }}
    steps:
      - name: Report dispatch context
        shell: bash
        run: |
          echo "PROBE_OK"
          echo "actor      = ${{ github.actor }}"
          echo "os_input   = ${{ inputs.os }}"
          echo "note       = ${{ inputs.note }}"
          echo "runner_os  = ${{ runner.os }}"
          echo "event      = ${{ github.event_name }}"
